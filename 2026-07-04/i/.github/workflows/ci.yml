name: CI - Validate Application

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Check server syntax
        run: node --check src/server.js
      
      - name: Verify config loads
        run: node -e "require('./src/config')"
      
      - name: Test API contracts parsing
        run: node -e "const {parseContract} = require('./src/contracts/contractParser'); console.log('Contract parsing OK')"